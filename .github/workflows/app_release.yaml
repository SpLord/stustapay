name: App Release
on: [workflow_call]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - name: pull lfs objects
        run: git lfs pull
      - name: get java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4
      - name: decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: ./app
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > keystore.jks
          mkdir -p ~/.gradle
          echo "ANDROID_KEY_STORE_FILE=$(pwd)/keystore.jks" >> ~/.gradle/gradle.properties
          echo "ANDROID_KEY_STORE_PASSWORD=${KEYSTORE_PASSWORD}" >> ~/.gradle/gradle.properties
          echo "ANDROID_KEY_ALIAS=${KEY_ALIAS}" >> ~/.gradle/gradle.properties
          echo "ANDROID_KEY_PASSWORD=${KEY_PASSWORD}" >> ~/.gradle/gradle.properties
          ./gradlew app:signingReport
      - name: build app
        working-directory: ./app
        run: ./gradlew app:assembleRelease
      - name: upload apk
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: ./app/app/build/outputs/apk/release/app-release.apk
